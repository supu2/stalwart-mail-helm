apiVersion: v1
kind: Service
metadata:
  name: {{ include "stalwart.fullname" . }}
  labels:
    {{- include "stalwart.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- with $.Values.service.loadBalancerClass }}
  loadBalancerClass: {{ . }}
  {{- end }}
  ports:
  {{- range $key, $val := $.Values.service.ports }}
    - name: {{ $key }}
      port: {{ $val }}
      targetPort: {{ $val }}
  {{- end }}
  selector:
    {{- include "stalwart.selectorLabels" . | nindent 4 }}
  {{- if .Values.service.externalIPs }}
  externalIPs: {{ .Values.service.externalIPs | toJson }}
  {{- end }}
  {{- if .Values.service.externalTrafficPolicy }}
  externalTrafficPolicy: {{ .Values.service.externalTrafficPolicy | quote }}
  {{- end }}
---
{{- if .Values.externalAccess.enabled }}
{{- range $i := until (int .Values.replicaCount) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "stalwart.fullname" $ }}-{{ $i }}
  labels:
    {{- include "stalwart.labels" $ | nindent 4 }}
  {{- with $.Values.externalAccess.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ $.Values.externalAccess.service.type }}
  {{- with $.Values.externalAccess.service.loadBalancerClass }}
  loadBalancerClass: {{ . }}
  {{- end }}
  ports:
  {{- range $key, $val := $.Values.externalAccess.service.ports }}
    - name: {{ $key }}
      port: {{ $val }}
      targetPort: {{ $val }}
  {{- end }}
  selector:
    {{- include "stalwart.selectorLabels" $ | nindent 4 }}
    statefulset.kubernetes.io/pod-name: {{ include "stalwart.fullname" $ }}-{{ $i }}
{{- end }}
{{- end }}
